name: Build & Deploy (Cloudflare Pages)

# Push to main → regenerate static pages → sanity-check → deploy to Cloudflare Pages.
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (Cloudflare → My Profile → API Tokens → "Cloudflare Pages: Edit")
#   CLOUDFLARE_ACCOUNT_ID  (Cloudflare dashboard URL / Workers&Pages overview)
# And set PROJECT_NAME below to your Cloudflare Pages project name.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  PROJECT_NAME: dentual-konya   # <-- Cloudflare Pages project adı

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate static pages (single source of truth)
        run: python tools/gen_pages.py

      - name: Sanity check (key files exist)
        run: |
          test -f index.html
          test -f 404.html
          test -f sitemap.xml
          test -f _headers
          for p in hakkimizda tedaviler blog iletisim gece-acik-dis-klinigi-konya \
                   subeler/selcuklu subeler/karatay subeler/meram; do
            test -f "$p/index.html" || { echo "MISSING $p/index.html"; exit 1; }
          done
          echo "All key pages present."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ env.PROJECT_NAME }} --commit-dirty=true

  # Optional: uncomment to gate deploys on Core Web Vitals (Lighthouse CI).
