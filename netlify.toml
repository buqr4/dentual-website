# Netlify yapılandırması — GitHub'a push edilince otomatik deploy
# gen_pages.py yalnızca Python stdlib (json, os) kullanır; ek bağımlılık yok.

[build]
  command = "python3 tools/gen_pages.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

# _headers ve _redirects dosyaları publish kökünden otomatik okunur.
